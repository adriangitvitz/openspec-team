# NOTE: artifact instructions and templates mirror spec-driven-deep with
# persona additions; there is no cross-schema template lookup, so fixes to
# spec-driven-deep must be mirrored here manually (and vice versa).
name: team-driven
version: 1
description: Persona-driven OpenSpec workflow - a virtual team (product owner, senior staff, senior engineer, developers, QA) authors and reviews each artifact, with human gates between phases
artifacts:
  - id: research
    generates: research.md
    description: Business and codebase grounding gathered before proposing - viability, existing solutions, critical paths, documents read
    template: research.md
    instruction: |
      PERSONA - Author: product-owner. No agent reviewer; the business-phase
      human gate reviews this artifact together with the proposal.

      Investigate BEFORE proposing, wearing the product-owner hat: the goal
      is evidence about whether and how this idea should be built, not
      implementation detail.

      When the change exists to answer an analysis or readiness question,
      scope every section to that question - the verdict emerges from the
      Landscape, Critical Paths, and Open Questions, not from a proposal
      pitch. When no documentation exists for the subject, investigate and
      create the grounding from scratch, recording a source for every claim.

      Process:
      1. For a product idea: research whether it already exists, how existing
         solutions approach it, and what evidence supports or undermines its
         viability. Record findings with sources in the Landscape section.
      2. Start from the knowledge map in these instructions (if present):
         read the files under every topic that plausibly relates to the
         change. Do not skip a topic because its name does not match the
         change's wording - domain terms and code terms often differ.
      3. Grep the codebase for the change's domain terms AND the code-level
         terms you discovered in step 2.
      4. For each behavior the change touches, find both the implementation
         file and the documentation/decision record that governs it. If a doc
         contradicts the code, record the discrepancy - do not pick silently.

      Sections:
      - **Landscape**: existing solutions, prior art, and viability evidence
        for the idea, each with its source.
      - **Critical Paths**: the subsystems this change touches that could
        break or be misunderstood, each with implementation and doc paths.
      - **Documents Read**: every doc consulted, with the load-bearing
        takeaway from each. Cite file paths.
      - **Affected Code**: the files that implement the behaviors being
        changed, with their current role.
      - **Open Questions**: what the evidence could not answer. These become
        explicit questions in the proposal, never silent assumptions.

      Every claim cites a file path or an external source. A change that
      skips a critical path here will be planned wrong in every later
      artifact.
    requires: []

  - id: proposal
    generates: proposal.md
    description: Business proposal outlining why the change matters, phased into digestible capabilities
    template: proposal.md
    instruction: |
      PERSONA - Author: product-owner. Reviewer: senior-staff (business-to-
      technical feasibility).

      Review protocol: the reviewer returns findings - severity
      (critical/major/minor), a one-line claim, file-path or source evidence.
      The author revises. At most two review rounds; unresolved findings go
      to the human gate as open questions.

      Create the proposal that establishes WHY this change is needed, in
      business terms that impact implementation.

      Ground every claim in research.md: the Capabilities and Impact sections
      must be consistent with the Landscape, Critical Paths, and Affected
      Code recorded there, and every Open Question from research.md must be
      either resolved here or carried forward explicitly.

      Sections:
      - **Why**: 1-2 sentences on the problem or opportunity. What problem does this solve? Why now?
      - **What Changes**: Bullet list of changes. Be specific about new capabilities, modifications, or removals. Mark breaking changes with **BREAKING**.
      - **Capabilities**: Distill the product into digestible, atomic phases -
        each capability is a phase of value tied to the user stories it serves:
        - **New Capabilities**: List capabilities being introduced. Each becomes a new `specs/<name>/spec.md`. Use kebab-case names (e.g., `user-auth`, `data-export`).
        - **Modified Capabilities**: List existing capabilities whose REQUIREMENTS are changing. Only include if spec-level behavior changes (not just implementation details). Each needs a delta spec file. Check `openspec/specs/` for existing spec names. Leave empty if no requirement changes.
      - **Impact**: Affected code, APIs, dependencies, or systems.

      IMPORTANT: The Capabilities section is critical. It creates the contract between
      proposal and specs phases. Research existing specs before filling this in.
      Each capability listed here will need a corresponding spec file.

      Keep it concise (1-2 pages). Focus on the "why" not the "how" -
      implementation details belong in design.md.
    requires:
      - research

  - id: specs
    generates: "specs/**/*.md"
    description: Detailed specifications for the change - business rules distilled into testable requirements
    template: spec.md
    instruction: |
      PERSONA - Author: senior-staff (translates the proposal's business
      rules into technical requirements). Reviewers: senior-engineer (design
      soundness) and qa (testability - every scenario must be concrete and
      verifiable).

      Review protocol: each reviewer returns findings - severity
      (critical/major/minor), a one-line claim, file-path evidence. The
      author revises. At most two review rounds; unresolved findings go to
      the human gate as open questions.

      Create specification files that define WHAT the system should do.

      Create one spec file per capability listed in the proposal's Capabilities section.
      - New capabilities: use the exact kebab-case name from the proposal (specs/<capability>/spec.md).
      - Modified capabilities: use the existing spec folder name from openspec/specs/<capability>/ when creating the delta spec at specs/<capability>/spec.md.

      Delta operations (use ## headers):
      - **ADDED Requirements**: New capabilities
      - **MODIFIED Requirements**: Changed behavior - MUST include full updated content
      - **REMOVED Requirements**: Deprecated features - MUST include **Reason** and **Migration**
      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format

      Format requirements:
      - Each requirement: `### Requirement: <name>` followed by description
      - Use SHALL/MUST for normative requirements (avoid should/may)
      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format
      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`). Using 3 hashtags or bullets will fail silently.
      - Every requirement MUST have at least one scenario.

      MODIFIED requirements workflow:
      1. Locate the existing requirement in openspec/specs/<capability>/spec.md
      2. Copy the ENTIRE requirement block (from `### Requirement:` through all scenarios)
      3. Paste under `## MODIFIED Requirements` and edit to reflect new behavior
      4. Ensure header text matches exactly (whitespace-insensitive)

      Common pitfall: Using MODIFIED with partial content loses detail at archive time.
      If adding new concerns without changing existing behavior, use ADDED instead.

      Specs should be testable - each scenario is a potential test case and
      becomes a row in the QA test matrix.
    requires:
      - proposal

  - id: design
    generates: design.md
    description: Technical design document with implementation decisions and rationale
    template: design.md
    instruction: |
      PERSONA - Author: senior-engineer (evaluates technology and code
      options, records what the product needs and why). Reviewer:
      senior-staff (does the design serve the business spec?).

      Review protocol: the reviewer returns findings - severity
      (critical/major/minor), a one-line claim, file-path evidence. The
      author revises. At most two review rounds; unresolved findings go to
      the human gate as open questions.

      Create the design document that explains HOW to implement the change.

      When to include design.md (create only if any apply):
      - Cross-cutting change (multiple services/modules) or new architectural pattern
      - New external dependency or significant data model changes
      - Security, performance, or migration complexity
      - Ambiguity that benefits from technical decisions before coding

      Sections:
      - **Context**: Background, current state, constraints, stakeholders
      - **Goals / Non-Goals**: What this design achieves and explicitly excludes
      - **Decisions**: Key technical choices with rationale (why X over Y?). Include alternatives considered for each decision.
      - **Risks / Trade-offs**: Known limitations, things that could go wrong. Format: [Risk] → Mitigation
      - **Migration Plan**: Steps to deploy, rollback strategy (if applicable)
      - **Open Questions**: Outstanding decisions or unknowns to resolve

      Focus on architecture and approach, not line-by-line implementation.
      Reference the proposal for motivation and specs for requirements.

      Good design docs explain the "why" behind technical decisions.
    requires:
      - proposal

  - id: test-matrix
    generates: test-matrix.md
    description: QA test matrix derived from the delta-spec scenarios - scenario x test type x priority
    template: test-matrix.md
    instruction: |
      PERSONA - Author: qa. No agent reviewer; the technical-design-phase
      human gate reviews this artifact together with specs and design.

      Build the test matrix that turns the specs into a verification plan.

      Requirements:
      - Every scenario in the change's delta specs MUST appear as a matrix
        row with a test type (unit / integration / e2e / manual) and a
        priority (high / medium / low).
      - Scenarios that are untestable as written (vague, unobservable, or a
        restatement of the requirement) MUST be flagged as findings against
        the specs artifact - severity, one-line claim, file-path evidence -
        so the specs author can fix them.
      - If these instructions' payload carries a referenced test matrix path
        (`teamTestMatrix`, from `team.test_matrix` in openspec/config.yaml),
        read that file and record coverage gaps between the change's
        scenarios and the referenced matrix instead of generating a matrix
        from scratch.

      Test tasks planned later (tasks.md) must trace back to matrix rows.
    requires:
      - specs

  - id: tasks
    generates: tasks.md
    description: Implementation checklist - atomic technical tasks traced to requirements
    template: tasks.md
    instruction: |
      PERSONA - Authors: backend-dev and frontend-dev (each plans the tasks
      for their side; single-sided changes leave the other author idle).
      Reviewer: senior-engineer (approves the plan and the reasoning behind
      each decision before implementation starts).

      Review protocol: the reviewer returns findings - severity
      (critical/major/minor), a one-line claim, file-path evidence. The
      authors revise. At most two review rounds; unresolved findings go to
      the human gate as open questions.

      Create the task list that breaks down the implementation work.

      **IMPORTANT: Follow the template below exactly.** The apply phase parses
      checkbox format to track progress. Tasks not using `- [ ]` won't be tracked.

      Guidelines:
      - Group related tasks under ## numbered headings
      - Each task MUST be a checkbox: `- [ ] X.Y Task description`
      - Tasks should be small enough to complete in one session
      - Order tasks by dependency (what must be done first?)
      - **Traceability markers**: every task that implements a requirement
        carries an inline marker `(req: <requirement name>)` matching the
        `### Requirement:` header in the delta specs. `openspec validate`
        warns on requirements no task references and on markers that match
        no requirement. Requirement names cannot contain `)`.
      - **Test tasks**: plan verification tasks from the test-matrix rows,
        with the same markers.

      Dependency vetting checklist - both developer personas MUST apply this
      to every new dependency a task introduces, in any ecosystem (Go
      modules, pnpm, npm, cargo, pip, ...), and record the verdict in the
      task description:
      - Registry health: package exists on the canonical registry, name is
        not a typosquat of a popular package.
      - Maintenance: recent releases or commits, responsive maintainers.
      - Known CVEs: check advisory databases for the pinned version.
      - Blast radius: prefer stdlib or an existing dependency when it covers
        the need.

      Example:
      ```
      ## 1. Core Implementation

      - [ ] 1.1 Implement data export function (req: User can export data)
      - [ ] 1.2 Add CSV formatting utilities (req: User can export data)

      ## 2. Verification

      - [ ] 2.1 Integration test: export happy path (req: User can export data)
      ```

      Reference specs for what needs to be built, design for how to build it,
      and the test matrix for what must be verified.
    requires:
      - design
      - test-matrix

apply:
  requires: [tasks]
  tracks: tasks.md
  traceability: true
  instruction: |
    Read context files, work through pending tasks, mark complete as you go.
    Honor the traceability markers: implementing a task means satisfying the
    requirement it references. Pause if you hit blockers or need clarification.
